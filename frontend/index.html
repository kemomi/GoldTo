<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoldTo — 群体智能预测引擎</title>
    <script>
      window.jsErrors = [];
      window.addEventListener('error', function(e) {
        window.jsErrors.push(e.message + ' at ' + e.filename + ':' + e.lineno);
        var el = document.getElementById('js-error-log');
        if (el) el.textContent = window.jsErrors.join('\n');
      });
      window.addEventListener('unhandledrejection', function(e) {
        window.jsErrors.push('Promise rejection: ' + e.reason);
        var el = document.getElementById('js-error-log');
        if (el) el.textContent = window.jsErrors.join('\n');
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
